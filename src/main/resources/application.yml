server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: tokenshop-api

  # MySQL数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tokenshop?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cococlaw.tokenshop.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: coco-claw-jwt-secret-key-change-in-production-2024
  expiration: 86400000  # 24小时
  header: Authorization
  prefix: Bearer

# Nacos配置 (可选，用于服务注册发现)
# nacos:
#   discovery:
#     server-addr: localhost:8848

# 微信支付配置 (需要填写)
wechatpay:
  appid: 
  mchid: 
  serial_no: 
  private_key_path: 
  apiv3_key: 
  notify_url: http://your-domain.com/api/pay/callback/wechat

# 支付宝配置 (需要填写)
alipay:
  appid: 
  private_key: 
  alipay_public_key: 
  notify_url: http://your-domain.com/api/pay/callback/alipay

# SMS配置 (需要填写)
sms:
  access_key: 
  access_secret: 
  sign_name: COCO_CLAW
  template_code: SMS_xxxxx

# 日志配置
logging:
  level:
    com.cococlaw.tokenshop: debug
    com.cococlaw.tokenshop.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
